
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Planner Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="navbar">

        <h2>📚 AI Study Planner</h2>

        <div class="nav-right">

            <button onclick="toggleDarkMode()">🌙 Dark Mode</button>

            <button onclick="logout()">Logout</button>

        </div>

    </header>


    <section class="welcome">

        <h1>
            Welcome,
            <span id="studentName"></span> 👋
        </h1>

        <p>Stay Consistent. Stay Focused. Success is Yours!</p>

    </section>


    <section class="cards">

        <div class="card">
            <h2>📚 Subjects</h2>
            <h1 id="subjectCount">0</h1>
        </div>

        <div class="card">
            <h2>⏰ Study Goal</h2>
            <h1>4 Hours</h1>
        </div>

        <div class="card">
            <h2>📈 Progress</h2>
            <h1 id="progressValue">0%</h1>
        </div>

    </section>


    <section class="recommendation">

        <div class="recommend-card">

            <h2>🤖 AI Recommendation</h2>

            <h3 id="recommendSubject">
                No Recommendation Available
            </h3>

        </div>

    </section>


    <section class="buttons">

        <button onclick="window.location.href='planner.html'">
            Study Planner
        </button>

        <button onclick="window.location.href='progress.html'">
            Progress Tracker
        </button>

    </section>


    <script>

        // Display Student Name

        let student = localStorage.getItem("studentName");

        if (student == null) {

            window.location.href = "login.html";

        } else {

            document.getElementById("studentName").innerHTML = student;

        }


        // Subject Count

        let subjects = JSON.parse(localStorage.getItem("subjects")) || [];

        document.getElementById("subjectCount").innerHTML = subjects.length;


        // Progress

        let progress = localStorage.getItem("progress") || 0;

        document.getElementById("progressValue").innerHTML = progress + "%";


        // AI Recommendation

        if (subjects.length > 0) {

            document.getElementById("recommendSubject").innerHTML =
                "Study : " + subjects[0].name;

        }


        // Logout

        function logout() {

            localStorage.removeItem("studentName");

            window.location.href = "login.html";

        }


        // Dark Mode

        function toggleDarkMode() {

            document.body.classList.toggle("dark");

        }

    </script>

</body>

</html>
